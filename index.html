<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visas Laborales GT | Evaluación Gratuita</title>

<meta name="description" content="Evaluación gratuita para visas laborales de Estados Unidos, Canadá y España. Conoce si reúnes los requisitos y agenda una asesoría personalizada.">

<meta name="keywords" content="visa H2A, visa H2B, Canadá, España, trabajo temporal, Guatemala, visas laborales">

<meta name="author" content="Visas Laborales GT">

<link rel="icon" type="image/png" href="img/logo.png">

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="Visas Laborales GT">
<meta property="og:description" content="Evaluación gratuita para visas laborales. Descubre si calificas para trabajar en Estados Unidos, Canadá o España.">
<!-- Se utiliza URL absoluta de Vercel para garantizar la visualización de la miniatura -->
<meta property="og:image" content="https://preevaluacion-visasgt.vercel.app/img/logo.png">
<meta property="og:site_name" content="Visas Laborales GT">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Visas Laborales GT">
<meta name="twitter:description" content="Evaluación gratuita para visas laborales.">
<meta name="twitter:image" content="https://preevaluacion-visasgt.vercel.app/img/logo.png">

<style>

:root{
--steel:#5b6b73;
--steel-dark:#2f3a40;
--gold:#c8a24a;
--silver:#d9dde0;
--bg:#0f1417;
--card:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}

body{
background:linear-gradient(160deg,#22313a,#5b6b73);
color:#222;
}

.banner{
width:100%;
display:block;
}

.banner img{
width:100%;
display:block;
max-height:330px;
object-fit:cover;
}

header{

padding:25px 20px;
text-align:center;
background:#233039;
color:#fff;
box-shadow:0 4px 15px rgba(0,0,0,.35);

}

.logo{

width:120px;
height:120px;
object-fit:contain;
background:transparent;
padding:0;
border:none;
border-radius:0;
box-shadow:0 10px 30px rgba(0,0,0,.35);
margin-top:-60px;

}

header h1{

margin-top:18px;
font-size:32px;
letter-spacing:1px;

}

header p{

margin-top:8px;
opacity:.9;
font-size:16px;

}

.container{

max-width:520px;
margin:auto;
padding:30px 15px 60px;

}

.card{
background:white;
border-radius:18px;
padding:24px;
box-shadow:0 12px 30px rgba(0,0,0,.25);

}

.card h2{

color:#2f3a40;
margin-bottom:6px;

}

.flags{

font-size:.9rem;
color:#777;
margin-bottom:16px;

}

label{

display:block;
margin-top:15px;
font-weight:600;
font-size:.9rem;

}

input,
select{

width:100%;
padding:11px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
font-size:.95rem;

}

.radio-group{

display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:8px;

}

.radio-group label{

background:#f3f3f3;
padding:8px 12px;
border-radius:20px;
font-weight:normal;
cursor:pointer;

}

.btn-eval{

margin-top:22px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#233039,#5b6b73);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;

}

.result{

display:none;
margin-top:20px;
padding:18px;
background:#fff8e8;
border:1px solid var(--gold);
border-radius:12px;

}

.result h3{

margin-bottom:10px;

}

.result ul{

margin-left:20px;

}

.btn-whatsapp{

display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
background:#25D366;
color:white;
padding:14px;
border-radius:10px;
margin-top:16px;
font-weight:bold;

}

.disclaimer{

margin-top:15px;
font-size:12px;
color:#666;
line-height:1.5;

}

/* Clase dinámica para ocultar selectores de idioma o experiencia condicionales */
.hidden-field {
    display: none;
}

</style>

</head>

<body>

<div class="banner">
<img src="img/banner.png" alt="Visas Laborales GT">
</div>

<header>

<img src="img/logo.png" class="logo" alt="Visas Laborales GT">

<h1>VISAS LABORALES GT</h1>

<p>
Evaluación gratuita • Asesoría profesional para visas laborales de
🇺🇸 Estados Unidos • 🇨🇦 Canadá • 🇪🇸 España
</p>

</header>

<div class="container">

  <!-- FORMULARIO UNIFICADO -->
  <form class="card" id="form-evaluacion">

    <h2>Evaluación General</h2>

    <div class="flags">
      Complete sus datos para conocer su elegibilidad laboral en el extranjero.
    </div>

    <label>¿A qué país desea aplicar para la evaluación?</label>
    <select name="pais_destino" id="pais_destino" required>
      <option value="">Seleccione el país</option>
      <option value="Estados Unidos">🇺🇸 Estados Unidos</option>
      <option value="Canadá">🇨🇦 Canadá</option>
      <option value="España">🇪🇸 España</option>
    </select>

    <label>Nombre completo</label>
    <input type="text" name="nombre" required>

    <label>Edad</label>
    <input type="number" name="edad" min="18" max="65" required>

    <label>Sexo</label>
    <div class="radio-group">
      <label><input type="radio" name="sexo" value="Masculino" required> Masculino</label>
      <label><input type="radio" name="sexo" value="Femenino"> Femenino</label>
    </div>

    <label>Departamento donde vive</label>
    <input type="text" name="depto" required>

    <label>¿Tiene pasaporte vigente?</label>
    <select name="pasaporte" required>
      <option value="">Seleccione</option>
      <option>Sí, vigente</option>
      <option>Vencido</option>
      <option>No tengo</option>
    </select>

    <!-- Experiencia laboral dinámica -->
    <label>¿Tiene experiencia laboral?</label>
    <select name="experiencia" id="experiencia" required>
      <option value="">Seleccione primero un país de interés</option>
    </select>

    <!-- Campo condicional de idiomas (Solo para Canadá) -->
    <div id="wrapper-idioma" class="hidden-field">
        <label>Nivel de inglés o francés</label>
        <select name="idioma" id="idioma">
            <option value="">Seleccione</option>
            <option>Básico</option>
            <option>Intermedio</option>
            <option>Avanzado</option>
            <option>No hablo</option>
        </select>
    </div>

    <!-- Campo condicional de contactos (Solo para España) -->
    <div id="wrapper-contactos" class="hidden-field">
        <label>¿Tiene familiares o contactos en España?</label>
        <div class="radio-group">
            <label><input type="radio" name="contactos" id="contacto_si" value="Sí"> Sí</label>
            <label><input type="radio" name="contactos" id="contacto_no" value="No"> No</label>
        </div>
    </div>

    <!-- Campo condicional de viajes (Solo para USA) -->
    <div id="wrapper-viajo" class="hidden-field">
        <label>¿Ha viajado antes a Estados Unidos?</label>
        <div class="radio-group">
            <label><input type="radio" name="viajo" id="viajo_si" value="Sí"> Sí</label>
            <label><input type="radio" name="viajo" id="viajo_no" value="No"> No</label>
        </div>
    </div>

    <label>¿Tiene antecedentes penales?</label>
    <div class="radio-group">
      <label><input type="radio" name="antecedentes" value="No" required> No</label>
      <label><input type="radio" name="antecedentes" value="Sí"> Sí</label>
    </div>

    <label>Día preferido para ser contactado</label>
    <select name="dia" required>
      <option value="">Seleccione</option>
      <option>Lunes</option>
      <option>Martes</option>
      <option>Miércoles</option>
      <option>Jueves</option>
      <option>Viernes</option>
      <option>Sábado</option>
    </select>

    <label>Horario preferido</label>
    <select name="hora" required>
      <option value="">Seleccione</option>
      <option>8:00 a.m. - 10:00 a.m.</option>
      <option>10:00 a.m. - 12:00 p.m.</option>
      <option>2:00 p.m. - 4:00 p.m.</option>
      <option>4:00 p.m. - 6:00 p.m.</option>
    </select>

    <label>Número de WhatsApp</label>
    <input
      type="tel"
      name="telefono"
      placeholder="Ejemplo: 5555-5555"
      required>

    <button type="submit" class="btn-eval">
      Ver mi evaluación
    </button>

    <div class="result" id="result-evaluacion"></div>

  </form>

</div>
<script>

const WHATSAPP_NUMBER = "50239124057";

// Opciones de experiencias laborales por cada país
const experienciasPorPais = {
  "Estados Unidos": [
    "Agrícola (cultivo o cosecha)",
    "Construcción",
    "Atención a pacientes / cuidado",
    "Hotelería / Restaurantes",
    "Fábricas / Producción",
    "Ninguna experiencia"
  ],
  "Canadá": [
    "Agrícola",
    "Construcción",
    "Procesamiento de alimentos",
    "Hotelería",
    "Manufactura",
    "Ninguna experiencia"
  ],
  "España": [
    "Agricultura",
    "Hostelería / Restaurantes",
    "Cuidado de adultos mayores",
    "Construcción",
    "Limpieza",
    "Ninguna experiencia"
  ]
};

const selectPais = document.getElementById("pais_destino");
const selectExperiencia = document.getElementById("experiencia");
const wrapperIdioma = document.getElementById("wrapper-idioma");
const selectIdioma = document.getElementById("idioma");
const wrapperContactos = document.getElementById("wrapper-contactos");
const wrapperViajo = document.getElementById("wrapper-viajo");

// Cambios dinámicos en el formulario al seleccionar el país
selectPais.addEventListener("change", function() {
    const pais = this.value;
    
    // Limpiar opciones de experiencia previa
    selectExperiencia.innerHTML = '<option value="">Seleccione</option>';
    
    // Ocultar todos los bloques condicionales inicialmente y remover su obligatoriedad
    wrapperIdioma.classList.add("hidden-field");
    selectIdioma.removeAttribute("required");
    
    wrapperContactos.classList.add("hidden-field");
    document.getElementById("contacto_si").removeAttribute("required");
    
    wrapperViajo.classList.add("hidden-field");
    document.getElementById("viajo_si").removeAttribute("required");

    if (experienciasPorPais[pais]) {
        // Cargar las experiencias correspondientes
        experienciasPorPais[pais].forEach(exp => {
            const option = document.createElement("option");
            option.value = exp;
            option.textContent = exp;
            selectExperiencia.appendChild(option);
        });

        // Mostrar campos requeridos según el país
        if (pais === "Canadá") {
            wrapperIdioma.classList.remove("hidden-field");
            selectIdioma.setAttribute("required", "required");
        } else if (pais === "España") {
            wrapperContactos.classList.remove("hidden-field");
            document.getElementById("contacto_si").setAttribute("required", "required");
        } else if (pais === "Estados Unidos") {
            wrapperViajo.classList.remove("hidden-field");
            document.getElementById("viajo_si").setAttribute("required", "required");
        }
    } else {
        selectExperiencia.innerHTML = '<option value="">Seleccione primero un país de interés</option>';
    }
});

// Función evaluadora unificada
function evaluar(data, pais){

    let observaciones=[];

    if(data.pasaporte==="No tengo"){
        observaciones.push("Debe tramitar un pasaporte vigente.");
    }

    if(data.pasaporte==="Vencido"){
        observaciones.push("Debe renovar su pasaporte.");
    }

    if(data.experiencia==="Ninguna experiencia"){
        observaciones.push("Se recomienda recibir orientación para elegir las mejores oportunidades laborales.");
    }

    if(data.antecedentes==="Sí"){
        observaciones.push("Su expediente requiere una revisión personalizada.");
    }

    if(pais==="Canadá" && data.idioma==="No hablo"){
        observaciones.push("Es recomendable aprender inglés básico para aumentar sus posibilidades.");
    }

    if(observaciones.length===0){
        observaciones.push("Cumple con los requisitos iniciales para iniciar su proceso.");
    }

    return observaciones;
}

// Envío del Formulario Único
const form = document.getElementById("form-evaluacion");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const datos = Object.fromEntries(new FormData(form).entries());
    const pais = datos.pais_destino;
    const resultado = document.getElementById("result-evaluacion");
    const lista = evaluar(datos, pais);

    let html = "";

    html += `
    <h3>✅ Resultado de su evaluación</h3>
    <p><strong>Hola ${datos.nombre}</strong>, gracias por completar su evaluación.</p>
    <p>De acuerdo con la información proporcionada para <strong>${pais}</strong>, estas son nuestras observaciones:</p>
    <ul>
    ${lista.map(i=>"<li>"+i+"</li>").join("")}
    </ul>
    <p>
    Un asesor de <strong>Visas Laborales GT</strong> revisará su caso y le orientará sobre el proceso más adecuado.
    </p>
    `;

    // Campos opcionales estructurados para que no envíen "undefined" en WhatsApp si no corresponden
    const campoIdioma = pais === "Canadá" ? `\nIdioma: ${datos.idioma}` : "";
    const campoContactos = pais === "España" ? `\nContactos en España: ${datos.contactos}` : "";
    const campoViajo = pais === "Estados Unidos" ? `\n¿Viajó antes a USA?: ${datos.viajo}` : "";

    const mensaje = 
`Hola.
Deseo agendar una asesoría gratuita.

País de interés: ${pais}
Nombre: ${datos.nombre}
Edad: ${datos.edad}
Sexo: ${datos.sexo}
Departamento: ${datos.depto}
Pasaporte: ${datos.pasaporte}
Experiencia: ${datos.experiencia}${campoIdioma}${campoContactos}${campoViajo}
Antecedentes: ${datos.antecedentes}
Día preferido: ${datos.dia}
Horario: ${datos.hora}
WhatsApp: ${datos.telefono}`;

    const url = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + encodeURIComponent(mensaje);

    html += `
    <a class="btn-whatsapp" href="${url}" target="_blank">
    📲 Agendar asesoría por WhatsApp
    </a>
    <p class="disclaimer">
    La presente evaluación es únicamente informativa y no constituye una aprobación de visa.
    La elegibilidad definitiva depende de la documentación presentada y de las autoridades migratorias correspondientes.
    </p>
    `;

    resultado.innerHTML = html;
    resultado.style.display = "block";
    resultado.scrollIntoView({
        behavior: "smooth"
    });
});

</script>

</body>
</html>
